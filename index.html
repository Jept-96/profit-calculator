<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Calculator</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      font-size: 16px;
      line-height: 1.5;
      padding: 40px 20px 80px;
    }

    /* ── Container ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid #e5e5e5;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #111111;
      margin-bottom: 6px;
    }
    header p {
      font-size: 0.95rem;
      color: #666666;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #333333;
      margin-bottom: 6px;
    }
    label .optional {
      font-weight: 400;
      color: #999999;
      margin-left: 4px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .symbol {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #999999;
      font-size: 0.9rem;
      pointer-events: none;
    }
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d4d4d4;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #111111;
      background: #ffffff;
      appearance: none;
      transition: border-color 0.15s;
    }
    .input-wrap input[type="number"] {
      padding-left: 26px;
    }
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }
    input[type="number"]::placeholder {
      color: #bbbbbb;
    }

    /* Select arrow */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 9px;
      height: 6px;
      background: #999999;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      pointer-events: none;
    }

    /* Error messages */
    .error {
      display: none;
      font-size: 0.8rem;
      color: #dc2626;
      margin-top: 5px;
    }

    /* ── Button ── */
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #111111;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.97rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333333; }
    .btn:active { background: #000000; }

    /* ── Results ── */
    #results {
      display: none;
      margin-top: 36px;
      padding-top: 32px;
      border-top: 1px solid #e5e5e5;
    }

    .results-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999999;
      margin-bottom: 16px;
    }

    /* Product card */
    .product-card {
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .product-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111111;
      margin-bottom: 3px;
    }
    .product-category {
      font-size: 0.8rem;
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .product-desc {
      font-size: 0.875rem;
      color: #555555;
      line-height: 1.5;
    }

    /* Profit breakdown */
    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .breakdown-item {
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
    }
    .breakdown-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.3px;
    }
    .breakdown-value.profit { color: #16a34a; }
    .breakdown-label {
      font-size: 0.72rem;
      color: #888888;
      margin-top: 3px;
    }

    /* Units calculation */
    .units-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .units-main {
      font-size: 1rem;
      font-weight: 600;
      color: #111111;
      margin-bottom: 4px;
    }
    .units-sub {
      font-size: 0.85rem;
      color: #666666;
    }

    /* Budget note */
    .budget-note {
      display: none;
      background: #fffbeb;
      border: 1.5px solid #fcd34d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #92400e;
      margin-bottom: 16px;
    }

    /* Action plan */
    .action-plan {
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      padding: 18px 20px;
    }
    .action-plan h3 {
      font-size: 0.875rem;
      font-weight: 700;
      color: #111111;
      margin-bottom: 14px;
    }
    .action-plan ol {
      padding-left: 20px;
    }
    .action-plan li {
      font-size: 0.875rem;
      color: #333333;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .action-plan li:last-child { margin-bottom: 0; }

    /* Reset link */
    .reset {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #3b82f6;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
    }
    .reset:hover { color: #1d4ed8; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 28px 16px 60px; }
      header h1 { font-size: 1.35rem; }
      .breakdown { grid-template-columns: 1fr 1fr; }
      .breakdown-item:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <h1>Profit Calculator</h1>
    <p>Find a product that matches your profit goal.</p>
  </header>

  <!-- Form -->
  <form id="calc-form" novalidate>

    <div class="form-group">
      <label for="target">Target Monthly Profit ($)</label>
      <div class="input-wrap">
        <span class="symbol">$</span>
        <input type="number" id="target" placeholder="e.g. 2000" min="1" />
      </div>
      <div class="error" id="err-target">Please enter your target monthly profit.</div>
    </div>

    <div class="form-group">
      <label for="budget">Starting Budget <span class="optional">(optional)</span></label>
      <div class="input-wrap">
        <span class="symbol">$</span>
        <input type="number" id="budget" placeholder="e.g. 500" min="0" />
      </div>
    </div>

    <div class="form-group">
      <label for="niche">Niche</label>
      <div class="select-wrap">
        <select id="niche">
          <option value="" disabled selected>Select a niche…</option>
          <option value="health">Health &amp; Wellness</option>
          <option value="beauty">Beauty &amp; Skincare</option>
          <option value="fitness">Fitness &amp; Sports</option>
          <option value="home">Home &amp; Kitchen</option>
          <option value="pets">Pets</option>
          <option value="tech">Tech Accessories</option>
          <option value="kids">Kids &amp; Babies</option>
          <option value="outdoors">Outdoors &amp; Travel</option>
        </select>
      </div>
      <div class="error" id="err-niche">Please select a niche.</div>
    </div>

    <button type="submit" class="btn">Find Winning Product</button>

  </form>

  <!-- Results -->
  <div id="results">

    <div class="results-title">Your Recommendation</div>

    <div class="product-card">
      <div class="product-name" id="r-name"></div>
      <div class="product-category" id="r-category"></div>
      <div class="product-desc" id="r-desc"></div>
    </div>

    <div class="results-title">Profit Breakdown</div>

    <div class="breakdown">
      <div class="breakdown-item">
        <div class="breakdown-value" id="r-cost"></div>
        <div class="breakdown-label">Cost per unit</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-value" id="r-price"></div>
        <div class="breakdown-label">Selling price</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-value profit" id="r-profit"></div>
        <div class="breakdown-label">Profit per unit</div>
      </div>
    </div>

    <div class="units-box">
      <div class="units-main" id="r-units-main"></div>
      <div class="units-sub" id="r-units-sub"></div>
    </div>

    <div class="budget-note" id="r-budget-note"></div>

    <div class="results-title">Action Plan</div>

    <div class="action-plan">
      <ol id="r-plan"></ol>
    </div>

    <button class="reset" onclick="reset()">← Start over</button>

  </div>

</div>

<script>
  // ─────────────────────────────────────────────────────────
  // CLIENT DATA — Replace these with your actual product list
  // ─────────────────────────────────────────────────────────
  const PRODUCTS = {
    health: {
      name:     "Immune Support Gummies",
      category: "Health & Wellness",
      desc:     "Daily vitamin gummies. High repeat-purchase rate, lightweight to ship.",
      cost:     6.50,
      price:    29.99,
      // ACTION PLAN — Replace with client's action plan text
      plan: [
        "Source from a certified supplement supplier with lab-tested ingredients.",
        "List on Amazon FBA and your own Shopify store.",
        "Run a 5-day launch promotion at 20% off to collect initial reviews.",
        "Target keywords: 'immune gummies', 'daily vitamins' via PPC ads.",
        "Scale to 50+ units/week once you hit a 4-star average."
      ]
    },
    beauty: {
      name:     "Vitamin C Brightening Serum",
      category: "Beauty & Skincare",
      desc:     "30ml serum with private-label potential. Strong demand on Etsy and Amazon.",
      cost:     5.00,
      price:    24.99,
      plan: [
        "Order a small MOQ sample run (50 units) to validate quality.",
        "Create a clean brand label and list on Etsy + Amazon.",
        "Send samples to micro-influencers (10k–50k followers) in the skincare space.",
        "Post before/after content on TikTok and Instagram Reels.",
        "Re-invest first month's profit into a larger batch for better unit economics."
      ]
    },
    fitness: {
      name:     "Resistance Band Set (5-piece)",
      category: "Fitness & Sports",
      desc:     "Stackable resistance bands. Best-seller category on Amazon, year-round demand.",
      cost:     4.80,
      price:    21.99,
      plan: [
        "Source from an established gym-equipment supplier with quality certifications.",
        "Bundle with a free PDF workout guide to increase perceived value.",
        "List on Amazon FBA — fitness gear sells well year-round.",
        "Run ads targeting 'home workout' and 'beginner fitness' audiences.",
        "Upsell buyers with a yoga mat or foam roller in a follow-up email."
      ]
    },
    home: {
      name:     "Bamboo Cutting Board Set",
      category: "Home & Kitchen",
      desc:     "3-piece bamboo set. Gift-friendly, customisable with laser engraving.",
      cost:     7.00,
      price:    32.99,
      plan: [
        "Find a supplier on Alibaba offering FSC-certified bamboo.",
        "Add custom laser-engraving (name/logo) to differentiate from competition.",
        "List on Amazon, Etsy, and Pinterest Shopping.",
        "Target gift-buying seasons: Mother's Day, Christmas, weddings.",
        "Offer a 3-piece bundle (S/M/L) to increase average order value."
      ]
    },
    pets: {
      name:     "Adjustable Dog Harness",
      category: "Pets",
      desc:     "No-pull harness with reflective stitching. Covers most breeds across 3 sizes.",
      cost:     5.50,
      price:    26.99,
      plan: [
        "Order samples in 3 sizes (S/M/L) to cover most dog breeds.",
        "Photograph on real dogs — lifestyle photos outperform product-only shots.",
        "List on Amazon, Chewy, and your own Shopify store.",
        "Partner with dog trainers or pet influencers for authentic reviews.",
        "Introduce seasonal color variants to keep the listing fresh."
      ]
    },
    tech: {
      name:     "MagSafe-Compatible Phone Wallet",
      category: "Tech Accessories",
      desc:     "Slim RFID-blocking wallet for iPhone 12–15. High impulse-buy conversion.",
      cost:     3.20,
      price:    17.99,
      plan: [
        "Source slim wallets with RFID blocking built in for extra value.",
        "Focus on iPhone 14/15 Pro buyers — large, active audience.",
        "List on Amazon and run TikTok Shop for viral potential.",
        "Create a 30-second demo video showing the snap-on convenience.",
        "Bundle 2-pack at a small discount to double units per order."
      ]
    },
    kids: {
      name:     "Montessori Stacking Toy Set",
      category: "Kids & Babies",
      desc:     "Wooden stacking rings for 6–24 months. Safety-certified, strong gifting demand.",
      cost:     6.00,
      price:    27.99,
      plan: [
        "Ensure the product meets ASTM F963 and CE safety standards.",
        "Write listings that speak to parents and gift-buyers, not just kids.",
        "List on Amazon Baby, Etsy, and Facebook Marketplace.",
        "Target ads to parents of 6–24 month age groups.",
        "Offer a gift-wrapping option at checkout to boost conversions."
      ]
    },
    outdoors: {
      name:     "Lightweight Packable Daypack",
      category: "Outdoors & Travel",
      desc:     "Folds into its own pocket. Appeals to hikers, travelers, and gym-goers.",
      cost:     8.50,
      price:    39.99,
      plan: [
        "Source a pack that folds into its own pocket — big differentiator.",
        "Target hikers, travelers, and gym-goers — wide addressable market.",
        "List on Amazon, REI Co-op marketplace, and your own store.",
        "Run ads before summer and holiday travel seasons.",
        "Add a lifetime warranty card inside every package to reduce returns."
      ]
    }
  };
  // ─────────────────────────────────────────────────────────

  const form   = document.getElementById('calc-form');
  const results = document.getElementById('results');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const targetEl = document.getElementById('target');
    const budgetEl = document.getElementById('budget');
    const nicheEl  = document.getElementById('niche');
    const errT = document.getElementById('err-target');
    const errN = document.getElementById('err-niche');

    // Clear errors
    errT.style.display = 'none';
    errN.style.display = 'none';

    // Validate
    const target = parseFloat(targetEl.value);
    const niche  = nicheEl.value;
    let valid = true;

    if (!targetEl.value || isNaN(target) || target <= 0) {
      errT.style.display = 'block';
      valid = false;
    }
    if (!niche) {
      errN.style.display = 'block';
      valid = false;
    }
    if (!valid) return;

    const budget  = parseFloat(budgetEl.value) || null;
    const product = PRODUCTS[niche];
    const profitPerUnit  = product.price - product.cost;
    const unitsNeeded    = Math.ceil(target / profitPerUnit);
    const unitsPerDay    = Math.ceil(unitsNeeded / 30);
    const totalStockCost = unitsNeeded * product.cost;

    // Populate product card
    document.getElementById('r-name').textContent     = product.name;
    document.getElementById('r-category').textContent = product.category;
    document.getElementById('r-desc').textContent     = product.desc;

    // Profit breakdown
    document.getElementById('r-cost').textContent   = fmt(product.cost);
    document.getElementById('r-price').textContent  = fmt(product.price);
    document.getElementById('r-profit').textContent = fmt(profitPerUnit);

    // Units calculation
    document.getElementById('r-units-main').textContent =
      `You need ${unitsNeeded.toLocaleString()} units to reach ${fmt(target)} profit per month.`;
    document.getElementById('r-units-sub').textContent =
      `≈ ${unitsPerDay} unit${unitsPerDay !== 1 ? 's' : ''} per day`;

    // Budget note
    const note = document.getElementById('r-budget-note');
    if (budget !== null && budget < totalStockCost) {
      const canAfford = Math.floor(budget / product.cost);
      note.style.display = 'block';
      note.textContent =
        `Note: Your budget (${fmt(budget)}) covers about ${canAfford} units. ` +
        `To hit your monthly target you need ${unitsNeeded} units ` +
        `(${fmt(totalStockCost)} in stock cost). Consider starting smaller and reinvesting profits.`;
    } else {
      note.style.display = 'none';
    }

    // Action plan
    const ol = document.getElementById('r-plan');
    ol.innerHTML = '';
    product.plan.forEach(step => {
      const li = document.createElement('li');
      li.textContent = step;
      ol.appendChild(li);
    });

    // Show results
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  function reset() {
    results.style.display = 'none';
    form.reset();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function fmt(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
</script>
</body>
</html>
